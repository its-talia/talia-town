<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talia Town</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1a1a2e;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #game-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 10;
    }
    #dialogue-box {
      display: none;
      pointer-events: all;
      margin: 0 auto 24px;
      max-width: 640px;
      background: rgba(15, 15, 30, 0.92);
      border: 2px solid #7b68ee;
      border-radius: 8px;
      padding: 16px;
      color: #f0e6ff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      position: relative;
    }
    #dialogue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    #dialogue-speaker {
      font-weight: bold;
      color: #b8a0ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #btn-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    #btn-close:hover { color: #f0e6ff; }
    #dialogue-text {
      min-height: 40px;
    }
    #dialogue-input-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    #dialogue-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid #7b68ee;
      border-radius: 4px;
      color: #f0e6ff;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    #dialogue-input:focus { border-color: #b8a0ff; }
    #btn-send, #btn-voice {
      background: #5a42d4;
      border: none;
      border-radius: 4px;
      color: white;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #btn-send:hover, #btn-voice:hover { background: #7b68ee; }
    #btn-voice.recording { background: #c0392b; }
    #hint-text {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="hint-text">WASD to move · Walk up to Talia to talk · Esc or ✕ to walk away</div>
  <div id="ui-overlay">
    <div id="dialogue-box">
      <div id="dialogue-header">
        <div id="dialogue-speaker">Talia</div>
        <button id="btn-close" title="Walk away (Esc)">✕</button>
      </div>
      <div id="dialogue-text"></div>
      <div id="dialogue-input-row">
        <input id="dialogue-input" type="text" placeholder="Say something..." autocomplete="off" />
        <button id="btn-voice">🎤</button>
        <button id="btn-send">Send</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
